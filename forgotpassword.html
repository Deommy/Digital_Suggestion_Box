<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset - Digital Suggestion Box</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Small helpers (works with your existing styles.css) */
    .hidden { display: none !important; }
    .alert.show { display: block; }
    .form-input.error { border: 1px solid #ff6b6b; }
    .form-error.show { display: block; }
.logo-img {
    width: 100px;
    height: auto;
    display: block;
    margin: 0 auto;
}

  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-box">

      <!-- Header (changes depending on step) -->
      <div class="auth-header">
        <div class="auth-logo">
          <div class="auth-logo">
    <img src="PULOGO.webp" alt="Logo" class="logo-img">
</div>
        </div>

        <h1 class="auth-title" id="pageTitle">Forgot Password</h1>
        <p class="auth-subtitle" id="pageSubtitle">Enter your email to reset your password</p>
      </div>

      <div id="alertMessage" class="alert" role="alert" aria-live="polite"></div>

      <!-- STEP 1: Forgot Password -->
      <form id="forgotPasswordForm">
        <div class="form-group">
          <label class="form-label" for="email">Institutional Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="yourname@school.edu"
            required
          />
          <span class="form-error" id="emailError"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          Send Reset Code
        </button>

        <div class="auth-footer">
          <p>Remember your password? <a href="login.html">Sign In</a></p>
        </div>
      </form>

      <!-- STEP 2: Reset Password -->
      <form id="resetPasswordForm" class="hidden">
        <p style="margin: 0 0 14px; font-size: 14px;">
          Reset code sent to: <b id="emailDisplay"></b>
        </p>

        <div class="form-group">
          <label class="form-label" for="resetCode">Reset Code</label>
          <input
            type="text"
            id="resetCode"
            name="resetCode"
            class="form-input"
            placeholder="6-digit code"
            maxlength="6"
            inputmode="numeric"
            required
          />
          <span class="form-error" id="codeError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="newPassword">New Password</label>
          <input
            type="password"
            id="newPassword"
            name="newPassword"
            class="form-input"
            placeholder="Create a strong password"
            required
          />
          <span class="form-error" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            class="form-input"
            placeholder="Re-enter your password"
            required
          />
          <span class="form-error" id="confirmPasswordError"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
          Reset Password
        </button>

        <div class="auth-footer" style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;">
          <a href="#" id="resendLink">Resend Code</a>
          <a href="login.html">Back to Sign In</a>
        </div>
      </form>

    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const forgotPasswordForm = document.getElementById("forgotPasswordForm");
      const resetPasswordForm = document.getElementById("resetPasswordForm");
      const emailInput = document.getElementById("email");
      const submitBtn = document.getElementById("submitBtn");

      const resetCodeInput = document.getElementById("resetCode");
      const newPasswordInput = document.getElementById("newPassword");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const resetBtn = document.getElementById("resetBtn");

      const resendLink = document.getElementById("resendLink");
      const alertMessage = document.getElementById("alertMessage");
      const emailDisplay = document.getElementById("emailDisplay");
      const pageTitle = document.getElementById("pageTitle");
      const pageSubtitle = document.getElementById("pageSubtitle");

      // Determine which screen to show
      const urlParams = new URLSearchParams(window.location.search);
      let email = urlParams.get("email");

      if (email) {
        showResetStep(email);
      } else {
        showForgotStep();
      }

      // --- STEP 1: Forgot Password (Send Code) ---
      forgotPasswordForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearErrors();
        hideAlert();

        const emailVal = emailInput.value.trim();

        if (!emailVal) {
          showError("emailError", "Email is required");
          emailInput.classList.add("error");
          return;
        }

        // Optional: enforce domain
        // if (!emailVal.endsWith("@panpacific.edu.ph")) {
        //   showError("emailError", "Please use your @panpacific.edu.ph email");
        //   emailInput.classList.add("error");
        //   return;
        // }

        submitBtn.disabled = true;
        submitBtn.textContent = "Sending...";

        const formData = new FormData();
        formData.append("action", "forgot_password");
        formData.append("email", emailVal);

        try {
          const response = await fetch("password-reset.php", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (data.success) {
            showAlert("success", data.message || "Reset code sent successfully.");

            // Move to reset step using query param
            setTimeout(() => {
              window.location.href = `password-reset.html?email=${encodeURIComponent(emailVal)}`;
            }, 700);
          } else {
            showAlert("error", data.message || "Failed to send reset code.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Send Reset Code";
          }
        } catch (err) {
          showAlert("error", "An error occurred. Please try again.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Send Reset Code";
        }
      });

      // --- STEP 2: Reset Password ---
      // numbers only
      resetCodeInput.addEventListener("input", function () {
        this.value = this.value.replace(/[^0-9]/g, "");
      });

      resetPasswordForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearErrors();
        hideAlert();

        const code = resetCodeInput.value.trim();
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (!email) {
          showAlert("error", "Missing email. Please request a code again.");
          showForgotStep();
          return;
        }

        if (code.length !== 6) {
          showError("codeError", "Please enter a 6-digit code");
          resetCodeInput.classList.add("error");
          return;
        }

        if (newPassword.length < 8) {
          showError("passwordError", "Password must be at least 8 characters");
          newPasswordInput.classList.add("error");
          return;
        }

        if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(newPassword)) {
          showError("passwordError", "Must contain uppercase, lowercase, and numbers");
          newPasswordInput.classList.add("error");
          return;
        }

        if (newPassword !== confirmPassword) {
          showError("confirmPasswordError", "Passwords do not match");
          confirmPasswordInput.classList.add("error");
          return;
        }

        resetBtn.disabled = true;
        resetBtn.textContent = "Resetting...";

        const formData = new FormData();
        formData.append("action", "reset_password");
        formData.append("email", email);
        formData.append("code", code);
        formData.append("newPassword", newPassword);

        try {
          const response = await fetch("password-reset.php", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (data.success) {
            showAlert("success", data.message || "Password reset successfully.");
            setTimeout(() => {
              window.location.href = "login.html";
            }, 2000);
          } else {
            showAlert("error", data.message || "Reset failed. Try again.");
            resetBtn.disabled = false;
            resetBtn.textContent = "Reset Password";
            resetCodeInput.value = "";
            newPasswordInput.value = "";
            confirmPasswordInput.value = "";
            resetCodeInput.focus();
          }
        } catch (error) {
          showAlert("error", "An error occurred. Please try again.");
          resetBtn.disabled = false;
          resetBtn.textContent = "Reset Password";
        }
      });

      // Resend code
      resendLink.addEventListener("click", async (e) => {
        e.preventDefault();
        hideAlert();

        if (!email) {
          showAlert("error", "Missing email. Please request a code again.");
          showForgotStep();
          return;
        }

        resendLink.style.pointerEvents = "none";
        const oldText = resendLink.textContent;
        resendLink.textContent = "Sending...";

        const formData = new FormData();
        formData.append("action", "forgot_password");
        formData.append("email", email);

        try {
          const response = await fetch("password-reset.php", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (data.success) {
            showAlert("success", "Reset code resent successfully!");
          } else {
            showAlert("error", data.message || "Failed to resend code.");
          }
        } catch (error) {
          showAlert("error", "Failed to resend code. Please try again.");
        } finally {
          setTimeout(() => {
            resendLink.style.pointerEvents = "auto";
            resendLink.textContent = oldText;
          }, 2500);
        }
      });

      // Live validation cleanup
      newPasswordInput.addEventListener("input", function () {
        if (this.value.length > 0) {
          document.getElementById("passwordError").classList.remove("show");
          this.classList.remove("error");
        }
      });

      confirmPasswordInput.addEventListener("input", function () {
        if (this.value === newPasswordInput.value) {
          document.getElementById("confirmPasswordError").classList.remove("show");
          this.classList.remove("error");
        }
      });

      // --- Helpers ---
      function showForgotStep() {
        pageTitle.textContent = "Forgot Password";
        pageSubtitle.textContent = "Enter your email to reset your password";
        forgotPasswordForm.classList.remove("hidden");
        resetPasswordForm.classList.add("hidden");
      }

      function showResetStep(emailVal) {
        email = emailVal; // keep in closure
        emailDisplay.textContent = emailVal;
        pageTitle.textContent = "Reset Password";
        pageSubtitle.textContent =
          "Enter the code sent to your email and set a new password";
        forgotPasswordForm.classList.add("hidden");
        resetPasswordForm.classList.remove("hidden");
      }

      function showError(elementId, message) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.classList.add("show");
      }

      function clearErrors() {
        document.querySelectorAll(".form-error").forEach((el) => {
          el.textContent = "";
          el.classList.remove("show");
        });
        document
          .querySelectorAll(".form-input")
          .forEach((inp) => inp.classList.remove("error"));
      }

      function showAlert(type, message) {
        alertMessage.className = `alert alert-${type} show`;
        alertMessage.textContent = message;
        alertMessage.style.display = "block";
      }

      function hideAlert() {
        alertMessage.className = "alert";
        alertMessage.textContent = "";
        alertMessage.style.display = "none";
      }
    });
  </script>
</body>
</html>
