<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Digital Suggestion Box</title>
    <link rel="stylesheet" href="styles.css">

    <style>.logo-img {
    width: 100px;
    height: auto;
    display: block;
    margin: 0 auto;
}</style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="auth-logo">
    <img src="PULOGO.webp" alt="Logo" class="logo-img">
</div>
                </div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join Digital Suggestion Box</p>
            </div>

            <div id="alertMessage" class="alert"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label" for="fullName">Full Name</label>
                   <input 
  type="text" 
  id="fullName" 
  name="fullName" 
  class="form-input" 
  placeholder="Enter your Full Name"
  required
                    >
                    <span class="form-error" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Institutional Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="yourname@school.edu"
                        required
                    >
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Create a strong password"
                        required
                    >
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        class="form-input" 
                        placeholder="Re-enter your password"
                        required
                    >
                    <span class="form-error" id="confirmPasswordError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="signupBtn">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="signup.js"></script>
</body>
</html>
