<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digital Suggestion Box</title>
    <link rel="stylesheet" href="styles.css">
<style>.logo-img {
    width: 100px;
    height: auto;
    display: block;
    margin: 0 auto;
}</style>



</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="auth-logo">
    <img src="PULOGO.webp" alt="Logo" class="logo-img">
</div>
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to Digital Suggestion Box</p>
            </div>

            <div id="alertMessage" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Institutional Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="yourname@school.edu"
                        required
                    >
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                    >
                    <span class="form-error" id="passwordError"></span>
                </div>
                <div class="form-group">

<!-- Forgot Password button -->
<div class="forgot-password">
    <a href="forgotpassword.html">Forgot Password?</a>
</div>


                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create Account</a></p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
