<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Digital Suggestion Box</title>
  <link rel="stylesheet" href="styles.css" />

  <style>.logo-img {
    width: 100px;
    height: auto;
    display: block;
    margin: 0 auto;
}</style>
  
</head>

<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <div class="auth-logo">
          <div class="auth-logo">
    <img src="PULOGO.webp" alt="Logo" class="logo-img">
</div>
        </div>
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">
          Enter the code sent to <br />
          <strong id="emailDisplay"></strong>
        </p>
      </div>

      <div id="alertMessage" class="alert"></div>

      <form id="resetForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label">Reset Code</label>
          <input
            type="text"
            id="code"
            name="reset_code"
            autocomplete="one-time-code"
            class="form-input"
            maxlength="6"
            placeholder="000000"
            required
            style="text-align:center;font-size:1.5rem;letter-spacing:.5em;"
          />
        </div>

        <div class="form-group">
          <label class="form-label">New Password</label>
          <input
            type="password"
            id="newPassword"
            name="new_password"
            autocomplete="new-password"
            class="form-input"
            placeholder="New password"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirm_password"
            class="form-input"
            autocomplete="new-password"
            placeholder="Confirm password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Reset Password
        </button>
      </form>

      <div class="auth-footer">
        <a href="login.html">Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");
    document.getElementById("emailDisplay").textContent = email || "";

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const code = document.getElementById("code").value.trim();
      const pass = document.getElementById("newPassword").value;
      const confirm = document.getElementById("confirmPassword").value;
      const alertBox = document.getElementById("alertMessage");

      if (pass !== confirm) {
        alertBox.className = "alert alert-error";
        alertBox.textContent = "Passwords do not match";
        return;
      }

      const formData = new FormData();
      formData.append("action", "reset_password");
      formData.append("email", email);
      formData.append("code", code);
      formData.append("newPassword", pass);

      const res = await fetch("password-reset.php", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (data.success) {
        alertBox.className = "alert alert-success";
        alertBox.textContent = "Password reset successfully!";
        setTimeout(() => (window.location.href = "login.html"), 1500);
      } else {
        alertBox.className = "alert alert-error";
        alertBox.textContent = data.message || "Reset failed";
      }
    });
  </script>
</body>
</html>
